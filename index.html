<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My E-commerce Store</title>
    <style>
        /* CSS: Isse website sundar dikhegi */
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 400px; background: #fff; margin: auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        img { width: 100%; border-radius: 8px; }
        h1 { font-size: 22px; color: #333; }
        .price { font-size: 20px; color: #27ae60; font-weight: bold; margin: 10px 0; }
        .btn { background: #ff4757; color: white; padding: 12px 20px; text-decoration: none; border-radius: 5px; display: inline-block; transition: 0.3s; }
        .btn:hover { background: #e84118; }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://via.placeholder.com/300" alt="Product Image">
        
        <h1>Stylish T-Shirt</h1>
        <p>Premium quality cotton t-shirt for daily wear.</p>
        
        <div class="price">₹499</div>

        <a href="https://wa.me/91YOURNUMBER" class="btn">Order on WhatsApp</a>
    </div>

</body>
</html>
